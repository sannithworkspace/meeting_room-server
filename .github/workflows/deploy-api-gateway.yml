name: Deploy API Gateway

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MeetingRoomBackend/api-gateway/**'
      - '.github/workflows/deploy-api-gateway.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build API Gateway JAR
        run: |
          cd MeetingRoomBackend
          mvn clean package -pl api-gateway -am -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./MeetingRoomBackend/api-gateway
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-api-gateway:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-api-gateway:${{ github.sha }}

      - name: Deploy Container to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-api-gateway:latest
            sudo docker stop api-gateway || true
            sudo docker rm api-gateway || true
            sudo docker run -d \
              --name api-gateway \
              --restart always \
              --network meetingroom-network \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e EUREKA_SERVER_URL=http://${{ secrets.EUREKA_USERNAME }}:${{ secrets.EUREKA_PASSWORD }}@eureka-server:8761/eureka/ \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-api-gateway:latest
