name: Deploy Eureka Server

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MeetingRoomBackend/eureka-server/**'
      - '.github/workflows/deploy-eureka-server.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Eureka Server JAR
        run: |
          cd MeetingRoomBackend
          mvn clean package -pl eureka-server -am -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./MeetingRoomBackend/eureka-server
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-eureka-server:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-eureka-server:${{ github.sha }}

      - name: Deploy Container to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker network create meetingroom-network || true
            sudo docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-eureka-server:latest
            sudo docker stop eureka-server || true
            sudo docker rm eureka-server || true
            sudo docker run -d \
              --name eureka-server \
              --restart always \
              --network meetingroom-network \
              -p 8761:8761 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e EUREKA_USERNAME=${{ secrets.EUREKA_USERNAME }} \
              -e EUREKA_PASSWORD=${{ secrets.EUREKA_PASSWORD }} \
              ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-eureka-server:latest
