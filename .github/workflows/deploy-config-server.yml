name: Deploy Config Server

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MeetingRoomBackend/config-server/**'
      - '.github/workflows/deploy-config-server.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Config Server JAR
        run: |
          cd MeetingRoomBackend
          mvn clean package -pl config-server -am -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./MeetingRoomBackend/config-server
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-config-server:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-config-server:${{ github.sha }}

      - name: Deploy Container to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-config-server:latest
            sudo docker stop config-server || true
            sudo docker rm config-server || true
            sudo docker run -d \
              --name config-server \
              --restart always \
              --network meetingroom-network \
              -p 8888:8888 \
              -e SPRING_PROFILES_ACTIVE=native \
              -e EUREKA_SERVER_URL=http://${{ secrets.EUREKA_USERNAME }}:${{ secrets.EUREKA_PASSWORD }}@eureka-server:8761/eureka/ \
              ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-config-server:latest
