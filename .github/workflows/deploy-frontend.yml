name: Deploy Frontend Application

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MeetingRoomFrontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Frontend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./MeetingRoomFrontend
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-frontend:${{ github.sha }}

      - name: Deploy Container to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-frontend:latest
            sudo docker stop frontend || true
            sudo docker rm frontend || true
            sudo docker run -d \
              --name frontend \
              --restart always \
              --network meetingroom-network \
              -p 80:80 \
              ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-frontend:latest
