name: Deploy Notification Service

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MeetingRoomBackend/notification-service/**'
      - '.github/workflows/deploy-notification-service.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Notification Service JAR
        run: |
          cd MeetingRoomBackend
          mvn clean package -pl notification-service -am -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./MeetingRoomBackend/notification-service
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-notification-service:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-notification-service:${{ github.sha }}

      - name: Deploy Container to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-notification-service:latest
            sudo docker stop notification-service || true
            sudo docker rm notification-service || true
            sudo docker run -d \
              --name notification-service \
              --restart always \
              --network meetingroom-network \
              -p 8086:8086 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e EUREKA_SERVER_URL=http://${{ secrets.EUREKA_USERNAME }}:${{ secrets.EUREKA_PASSWORD }}@eureka-server:8761/eureka/ \
              -e CONFIG_SERVER_URL=http://config-server:8888 \
              -e SMTP_HOST="${{ secrets.SMTP_HOST }}" \
              -e SMTP_PORT="${{ secrets.SMTP_PORT }}" \
              -e SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}" \
              -e SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
              ${{ secrets.DOCKER_HUB_USERNAME }}/meetingroom-notification-service:latest
