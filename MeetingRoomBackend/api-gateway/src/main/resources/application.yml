server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**, /auth-service/v3/api-docs
          filters:
            - name: CircuitBreaker
              args:
                name: authServiceCircuitBreaker
                fallbackUri: forward:/fallback/auth

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**, /user-service/v3/api-docs
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback/user

        - id: booking-service
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/bookings/**, /booking-service/v3/api-docs
          filters:
            - name: CircuitBreaker
              args:
                name: bookingServiceCircuitBreaker
                fallbackUri: forward:/fallback/booking

        - id: room-service
          uri: lb://ROOM-SERVICE
          predicates:
            - Path=/rooms/**, /room-service/v3/api-docs
          filters:
            - name: CircuitBreaker
              args:
                name: roomServiceCircuitBreaker
                fallbackUri: forward:/fallback/room

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://admin:admin123@localhost:8761/eureka/}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-request-duration: true
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus,refresh,env,busrefresh
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
