server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: file:./config-repo,file:/app/config-repo,classpath:/config-repo

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://admin:admin123@localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
