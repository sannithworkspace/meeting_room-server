# ─────────────────────────────────────────────────────────────
# Central configuration for notification-service (Port 8086)
# Served dynamically by Config Server (Port 8888)
# ─────────────────────────────────────────────────────────────

spring:
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
