# ─────────────────────────────────────────────────────────────
# Global Configuration shared across ALL microservices
# Served dynamically by Config Server (port 8888)
# ─────────────────────────────────────────────────────────────

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh,env,busrefresh

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

---
# ─────────────────────────────────────────────────────────────
# Local Dev profile overrides: Force 127.0.0.1 to avoid VPN conflicts
# ─────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
